options:
  button_color:
    plugin: property
    label: Button Color
    default: nebula
    description: Choose a color for the button link.
    options:
      nebula:
        label: Nebula
      neptune:
        label: Neptune
  card_style:
    plugin: css_class
    label: Style
    default: card
    description: Choose a visual style for this component.
    options:
      banner:
        label: Banner
        class: card-style--banner
      card:
        label: Card
        class: card-style--card
      cta:
        label: CTA
        class: card-style--cta
      featured_card:
        label: Featured Card
        class: card-style--featured-card
      featured_teaser:
        label: Featured Teaser
        class: card-style--featured-teaser
      teaser:
        label: Teaser
        class: card-style--teaser
  divider_size:
    plugin: property
    label: Divider Size
    default: medium
    description: Choose a size for the divider.
    options:
      small:
        label: Small
      medium:
        label: Medium
      large:
        label: Large
  divider_style:
    plugin: property
    label: Divider Style
    default: solid
    description: Choose a style for the divider.
    options:
      solid:
        label: Solid
      dashed:
        label: Dashed
      dotted:
        label: Dotted

contexts:
  paragraphs:
    me_test_button:
      options:
        button_color: true
    me_test_card:
      options:
        card_style: true
    me_test_divider:
      options:
        divider_size: true
        divider_style: true
