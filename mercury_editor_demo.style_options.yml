options:
  button_color:
    plugin: property
    label: Button Color
    default: nebula
    description: Choose a color for the button link.
    options:
      nebula:
        label: Nebula
      neptune:
        label: Neptune
  divider_size:
    plugin: property
    label: Divider Size
    default: medium
    description: Choose a size for the divider.
    options:
      small:
        label: Small
      medium:
        label: Medium
      large:
        label: Large
  divider_style:
    plugin: property
    label: Divider Style
    default: solid
    description: Choose a style for the divider.
    options:
      solid:
        label: Solid
      dashed:
        label: Dashed
      dotted:
        label: Dotted

contexts:
  paragraphs:
    me_test_button:
      options:
        button_color: true
    me_test_divider:
      options:
        divider_size: true
        divider_style: true
