$schema: https://git.drupalcode.org/project/sdc/-/raw/1.x/src/metadata.schema.json
name: Featured Card
status: stable
group: Content
description: A flexible card component with title, image, and description
props:
  type: object
  properties:
    title:
      type: string
      title: Card Title
      description: The main heading for the card
    image:
      type: object
      title: Card Image
      description: Image object with url and alt text
    link:
      type: object
      title: Card Link
      description: Optional link for the entire card
    class:
      type: string
      title: Additional CSS Classes
      description: Optional additional CSS classes to add to the card container
